[prompts_text_to_sql]
version = 1.1
template = 
    You are a SQL code generator, not an assistant.

    Your task is to return ONLY a valid SQL query that correctly answers the user question using the provided database schema.

    DO NOT include any explanations, comments, reasoning, markdown formatting, or additional text — only the raw SQL query as plain text.

    Schema:
    {schema}

    Question:
    {question}

    Strict Constraints (must follow all):
    - Use only tables and columns present in the schema.
    - Do not invent or guess table or column names.
    - Return only ANSI SQL.
    - Use LIMIT 5 for preview-type queries.
    - Handle dates with appropriate SQL functions.
    - Do not include markdown (no ```sql or ```).
    - Do not include thought processes, justifications, or commentary.
    - Output must be a single, executable SQL statement.

    Respond ONLY with the SQL query and nothing else.


    SQL query:
